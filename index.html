<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BritMax Streaming</title>
    <style>
        body { background: radial-gradient(circle, #050510, #000); color: #fff; font-family: sans-serif; margin: 0; min-height: 100vh; overflow-x: hidden; }
        header { padding: 30px; text-align: center; border-bottom: 3px solid #6a0dad; background: #000; box-shadow: 0 4px 20px rgba(106, 13, 173, 0.4); }
        h1 { margin: 0; font-size: 3.5rem; background: linear-gradient(45deg, #FFD700, #FF007F); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; letter-spacing: 6px; filter: drop-shadow(0 0 8px rgba(255, 0, 127, 0.5)); }
        #catalog { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 30px; padding: 50px; }
        .movie-card { position: relative; background: #0a0a1a; border-radius: 8px; border: 2px solid #1a1a40; overflow: hidden; cursor: pointer; transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1); }
        .movie-card:hover { transform: scale(1.07); box-shadow: 0 0 15px #8a2be2, 0 0 30px #FF007F; border-color: #FF007F; }
        .movie-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; filter: saturate(0.8); transition: 0.4s; }
        .movie-card:hover img { filter: saturate(1.2); }
        .card-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, #12002b 20%, transparent 100%); padding: 20px; opacity: 0; transition: 0.4s; }
        .movie-card:hover .card-overlay { opacity: 1; }
        .card-overlay h3 { margin: 0; color: #FFD700; font-size: 1.1rem; }
        .card-overlay p { margin: 5px 0 0; color: #00d4ff; font-size: 0.85rem; font-weight: bold; }
    </style>
</head>
<body>
    <header><h1>BritMax</h1></header>
    <main id="catalog"></main>
    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbz-c3zccgU2NRkc1oZynLylQpLrYWV0VRCp3wFkkh32KIgEZ80cgHARTuTLtYingOFhag/exec";
        async function load() {
            try {
                const res = await fetch(API_URL);
                const movies = await res.json();
                const container = document.getElementById('catalog');
                movies.forEach(m => {
                    const card = document.createElement('div');
                    card.className = 'movie-card';
                    card.innerHTML = `<img src="${m.Poster_URL}" alt="${m.Title}"><div class="card-overlay"><h3>${m.Title}</h3><p>${m.Genre} • ${m.Rating}</p></div>`;
                    card.onclick = () => window.open(`https://rumble.com/embed/${m.Rumble_Embed_ID}/`, "_blank", "width=800,height=450");
                    container.appendChild(card);
                });
            } catch (e) { console.error("Load failed", e); }
        }
        load();
    </script>
</body>
</html>
