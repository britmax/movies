<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BritMax Streaming</title>
    <style>
        /* Base Cinematic Theme */
        body { 
            background: radial-gradient(circle, #050510, #000); 
            color: #fff; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding-bottom: 100px;
            min-height: 100vh; 
        }

        /* Header & Official Banner */
        header { 
            padding: 20px; 
            text-align: center; 
            border-bottom: 3px solid #6a0dad; 
            background: #000; 
            box-shadow: 0 4px 30px rgba(106, 13, 173, 0.5); 
        }
        .logo-banner { 
            max-width: 100%; 
            height: auto; 
            max-height: 220px; 
            filter: drop-shadow(0 0 12px rgba(106, 13, 173, 0.6));
        }

        /* Genre Sections */
        .genre-section { margin-top: 50px; padding: 0 5%; }
        
        .genre-title { 
            font-size: 1.8rem; 
            text-transform: uppercase; 
            letter-spacing: 5px; 
            margin-bottom: 25px;
            display: inline-block;
            padding-bottom: 8px;
            font-weight: bold;
        }

        /* Neon Color Palette */
        .neon-cyan { color: #00d4ff; text-shadow: 0 0 15px #00d4ff; border-bottom: 3px solid #00d4ff; }
        .neon-magenta { color: #FF007F; text-shadow: 0 0 15px #FF007F; border-bottom: 3px solid #FF007F; }
        .neon-gold { color: #FFD700; text-shadow: 0 0 15px #FFD700; border-bottom: 3px solid #FFD700; }
        .neon-green { color: #39FF14; text-shadow: 0 0 15px #39FF14; border-bottom: 3px solid #39FF14; }

        /* Movie Grid Layout */
        .movie-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); 
            gap: 30px; 
        }

        /* Movie Cards */
        .movie-card { 
            position: relative; 
            background: #0a0a1a; 
            border-radius: 10px; 
            border: 2px solid #1a1a40; 
            overflow: hidden; 
            cursor: pointer; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        .movie-card:hover { 
            transform: translateY(-12px) scale(1.02); 
            border-color: #FF007F; 
            box-shadow: 0 0 30px rgba(255, 0, 127, 0.4); 
        }
        .movie-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
        
        .info { padding: 15px; background: linear-gradient(to top, #000 80%, transparent); }
        .info h3 { margin: 0; color: #fff; font-size: 1.1rem; letter-spacing: 1px; }
        .info p { margin: 8px 0 0; color: #bbb; font-size: 0.85rem; line-height: 1.4; height: 3em; overflow: hidden; }

        #loader { text-align: center; padding: 100px; font-size: 1.5rem; color: #6a0dad; }
    </style>
</head>
<body>

    <header>
        <img src="https://i.postimg.cc/XJB8vP5G/Brit-Max-logo-Reddit-banner.png" alt="BritMax" class="logo-banner">
    </header>

    <main id="catalog">
        <div id="loader">INITIALIZING BRITMAX FEED...</div>
    </main>

    <script>
        // THIS URL IS CONNECTED TO YOUR BRITMAX STREAMING APPS SCRIPT
        const API_URL = "https://script.google.com/macros/s/AKfycbz-c3zccgU2NRkc1oZynLylQpLrYWV0VRCp3wFkkh32KIgEZ80cgHARTuTLtYingOFhag/exec";

        async function loadMovies() {
            const container = document.getElementById('catalog');
            try {
                // 'redirect: follow' is the "handshake" that allows the cross-site data talk
                const response = await fetch(API_URL, { redirect: 'follow' });
                if (!response.ok) throw new Error('Web App Response Error');
                
                const movies = await response.json();
                
                // Group movies by Genre
                const genres = {};
                movies.forEach(movie => {
                    if (!genres[movie.Genre]) { genres[movie.Genre] = []; }
                    genres[movie.Genre].push(movie);
                });

                container.innerHTML = ""; 

                const colorList = ['neon-cyan', 'neon-magenta', 'neon-gold', 'neon-green'];
                let colorIndex = 0;

                // Build each neon section
                for (const genre in genres) {
                    const sectionColor = colorList[colorIndex % colorList.length];
                    
                    const section = document.createElement('div');
                    section.className = 'genre-section';
                    section.innerHTML = `
                        <h2 class="genre-title ${sectionColor}">${genre}</h2>
                        <div class="movie-grid" id="grid-${genre.replace(/\s+/g, '')}"></div>
                    `;
                    container.appendChild(section);

                    const grid = document.getElementById(`grid-${genre.replace(/\s+/g, '')}`);
                    
                    genres[genre].forEach(movie => {
                        const card = document.createElement('div');
                        card.className = 'movie-card';
                        card.innerHTML = `
                            <img src="${movie.Poster_URL}" alt="${movie.Title}" onerror="this.src='https://via.placeholder.com/300x450?text=Poster+Missing'">
                            <div class="info">
                                <h3>${movie.Title}</h3>
                                <p>${movie.Description}</p>
                                <div style="color:${sectionColor.replace('neon-', '')}; font-size: 0.7rem; margin-top:10px; font-weight:bold;">RATING: ${movie.Rating}</div>
                            </div>
                        `;
                        // This uses column 5 (Rumble_Embed_ID) to open the player
                        card.onclick = () => window.open(movie.Rumble_Embed_ID, "_blank");
                        grid.appendChild(card);
                    });
                    colorIndex++;
                }

            } catch (error) {
                console.error("Critical Failure:", error);
                container.innerHTML = `
                    <div style="text-align:center; padding: 50px; color: #FF007F;">
                        <h2>CONNECTION ERROR</h2>
                        <p>Verify Google Apps Script is deployed to 'Anyone'.</p>
                        <p style="font-size: 0.8rem; color: #666;">Error Detail: ${error.message}</p>
                    </div>`;
            }
        }

        loadMovies();
    </script>
</body>
</html>
